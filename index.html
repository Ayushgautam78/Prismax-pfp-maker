<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Prisma PFP Generator</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<div class="stars"></div>

<h1 class="title">PrismaX</h1>

<div class="panel">

<canvas id="canvas"></canvas>

<input type="file" id="upload" accept="image/*">

<label>Zoom</label>
<input type="range" id="zoom" min="0.05" max="10" step="0.01" value="1">

<label>Rotate</label>
<input type="range" id="rotate" min="-180" max="180" step="1" value="0">

<button id="download">Download PFP</button>

</div>

<script src="script.js"></script>

</body>
</html>
