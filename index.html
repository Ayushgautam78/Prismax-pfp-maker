<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Prisma PFP Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold-light: #f5d580;
    --gold:       #d4a437;
    --gold-dark:  #a06c1a;
    --brown-deep: #3b1f08;
    --brown-mid:  #6b3a1f;
    --glass-bg:   rgba(255,255,255,0.08);
    --glass-border: rgba(255,215,100,0.25);
    --glow:       rgba(212,164,55,0.5);
  }

  /* ── BASE ── */
  html, body {
    min-height: 100%;
    font-family: 'Raleway', sans-serif;
    background: radial-gradient(ellipse at 20% 0%, #5c300a 0%, #1e0c02 55%, #0d0500 100%);
    color: #f5d580;
    overflow-x: hidden;
  }

  /* ── ANIMATED BACKGROUND ── */
  .bg-orbs {
    position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
  }
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.35;
    animation: floatOrb linear infinite;
  }
  .orb1 { width:500px; height:500px; background:radial-gradient(#d4a437,#8b5e2b00); top:-100px; left:-100px; animation-duration:18s; }
  .orb2 { width:350px; height:350px; background:radial-gradient(#a06c1a,#3b1f0800); bottom:0; right:-60px; animation-duration:22s; animation-delay:-8s; }
  .orb3 { width:250px; height:250px; background:radial-gradient(#f5d580,#d4a43700); top:40%; left:50%; animation-duration:15s; animation-delay:-4s; }

  @keyframes floatOrb {
    0%   { transform: translate(0,0) scale(1); }
    33%  { transform: translate(40px,-60px) scale(1.1); }
    66%  { transform: translate(-30px,40px) scale(0.9); }
    100% { transform: translate(0,0) scale(1); }
  }

  /* gold particle dust */
  .dust { position:fixed; inset:0; pointer-events:none; z-index:0; }
  .dust::before, .dust::after {
    content:'';
    position:absolute; inset:0;
    background-image:
      radial-gradient(rgba(245,213,128,0.55) 1px, transparent 1px),
      radial-gradient(rgba(212,164,55,0.35) 1px, transparent 1px);
    background-size: 80px 80px, 130px 130px;
    background-position: 0 0, 40px 40px;
    animation: dustDrift 30s linear infinite;
  }
  .dust::after { animation-duration:45s; animation-direction:reverse; opacity:0.5; }
  @keyframes dustDrift {
    from { transform: translateY(0); }
    to   { transform: translateY(-200px); }
  }

  /* ── LAYOUT ── */
  .page {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 40px 16px 60px;
    gap: 28px;
  }

  /* ── HEADER ── */
  header { text-align: center; }
  .logo-tag {
    display: inline-block;
    font-size: 11px; letter-spacing: 5px; text-transform: uppercase;
    color: var(--gold);
    border: 1px solid rgba(212,164,55,0.3);
    padding: 4px 16px; border-radius: 100px;
    margin-bottom: 14px;
    animation: fadeDown .8s ease both;
  }
  .brand-logo {
    max-width: 420px;
    width: 85%;
    height: auto;
    display: block;
    margin: 0 auto;
    animation: fadeDown .9s .1s ease both;
    filter: drop-shadow(0 0 24px rgba(212,164,55,0.45));
  }
  .subtitle {
    font-size: 13px; letter-spacing: 3px; color: rgba(245,213,128,0.5);
    margin-top: 8px; text-transform: uppercase;
    animation: fadeDown .9s .2s ease both;
  }
  @keyframes fadeDown {
    from { opacity:0; transform:translateY(-24px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* ── MAIN CARD ── */
  .card {
    width: 100%; max-width: 480px;
    background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.03) 100%);
    backdrop-filter: blur(28px) saturate(1.4);
    -webkit-backdrop-filter: blur(28px) saturate(1.4);
    border: 1px solid var(--glass-border);
    border-radius: 28px;
    padding: 28px 24px 32px;
    box-shadow:
      0 0 0 1px rgba(212,164,55,0.08) inset,
      0 8px 60px rgba(0,0,0,0.5),
      0 0 80px rgba(212,164,55,0.08);
    animation: riseCard .9s .3s cubic-bezier(.22,1,.36,1) both;
    position: relative; overflow: hidden;
  }
  /* inner shimmer line */
  .card::before {
    content:'';
    position:absolute; top:0; left:20%; right:20%; height:1px;
    background: linear-gradient(90deg, transparent, rgba(245,213,128,0.6), transparent);
  }
  @keyframes riseCard {
    from { opacity:0; transform:translateY(40px) scale(.97); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }

  /* ── CANVAS WRAPPER ── */
  .canvas-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 1;
    border-radius: 20px;
    overflow: hidden;
    border: 1.5px solid rgba(212,164,55,0.35);
    box-shadow: 0 0 40px rgba(212,164,55,0.15), 0 4px 30px rgba(0,0,0,0.4);
    cursor: crosshair;
    background: rgba(0,0,0,0.4);
    touch-action: none;
  }
  .canvas-wrap::after {
    content:'';
    position:absolute; inset:0; pointer-events:none;
    border-radius:20px;
    background: linear-gradient(135deg, rgba(245,213,128,0.04) 0%, transparent 60%);
  }
  canvas { width:100%; height:100%; display:block; }

  /* placeholder text when no image */
  .canvas-placeholder {
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:10px; pointer-events:none;
    opacity:1; transition:opacity .4s;
  }
  .canvas-placeholder.hidden { opacity:0; }
  .placeholder-icon { font-size:40px; opacity:.5; }
  .placeholder-text { font-size:13px; letter-spacing:2px; color:rgba(245,213,128,0.4); text-transform:uppercase; }

  /* ── UPLOAD ZONE ── */
  .upload-zone {
    width: 100%;
    border: 1.5px dashed rgba(212,164,55,0.35);
    border-radius: 16px;
    padding: 18px;
    text-align: center;
    cursor: pointer;
    transition: all .3s;
    background: rgba(212,164,55,0.04);
    position: relative;
    overflow: hidden;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--gold);
    background: rgba(212,164,55,0.1);
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(212,164,55,0.15);
  }
  .upload-zone input {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width:100%; height:100%;
  }
  .upload-icon { font-size: 28px; margin-bottom: 6px; display:block; }
  .upload-label { font-size: 13px; letter-spacing: 1.5px; color: var(--gold); font-weight: 600; }
  .upload-sub { font-size: 11px; color: rgba(245,213,128,0.4); margin-top: 3px; letter-spacing: 1px; }

  /* ── CONTROLS ── */
  .controls { width:100%; display:flex; flex-direction:column; gap:16px; margin-top:4px; }

  .ctrl-row { display:flex; flex-direction:column; gap:6px; }
  .ctrl-label {
    font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase;
    color: rgba(245,213,128,0.55); display:flex; justify-content:space-between;
  }
  .ctrl-label span { color: var(--gold); font-weight:600; }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%; height: 4px;
    border-radius: 4px;
    background: rgba(255,255,255,0.1);
    outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: linear-gradient(135deg, #f5d580, #a06c1a);
    border: 2px solid rgba(255,255,255,0.3);
    box-shadow: 0 0 10px rgba(212,164,55,0.5);
    cursor: pointer;
    transition: transform .2s, box-shadow .2s;
  }
  input[type=range]::-webkit-slider-thumb:active {
    transform: scale(1.25);
    box-shadow: 0 0 20px rgba(212,164,55,0.8);
  }
  input[type=range]::-webkit-slider-runnable-track {
    height: 4px; border-radius: 4px;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold-light));
  }

  /* ── DIVIDER ── */
  .divider {
    width:100%; height:1px;
    background: linear-gradient(90deg, transparent, rgba(212,164,55,0.2), transparent);
    margin: 4px 0;
  }

  /* ── BUTTONS ── */
  .btn-row { display:flex; gap:10px; width:100%; margin-top:4px; }

  .btn {
    flex:1; padding:14px 10px;
    border: none; border-radius: 14px;
    font-family: 'Raleway', sans-serif;
    font-size: 13px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer;
    transition: all .25s cubic-bezier(.22,1,.36,1);
    position:relative; overflow:hidden;
  }
  .btn::after {
    content:'';
    position:absolute; inset:0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
    opacity:0; transition:opacity .25s;
  }
  .btn:hover::after { opacity:1; }
  .btn:hover { transform: translateY(-3px); }
  .btn:active { transform: translateY(0) scale(.97); }

  .btn-primary {
    background: linear-gradient(135deg, #f5d580 0%, #d4a437 50%, #8b5e2b 100%);
    color: #1e0c02;
    box-shadow: 0 4px 20px rgba(212,164,55,0.35);
  }
  .btn-primary:hover { box-shadow: 0 8px 30px rgba(212,164,55,0.55); }

  .btn-secondary {
    background: rgba(255,255,255,0.07);
    color: var(--gold);
    border: 1px solid rgba(212,164,55,0.3);
    backdrop-filter: blur(10px);
  }
  .btn-secondary:hover { background:rgba(212,164,55,0.12); border-color:var(--gold); }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 30px; left:50%; transform:translateX(-50%) translateY(80px);
    background: linear-gradient(135deg, #2a1505, #3d1f0a);
    border: 1px solid var(--gold-dark);
    color: var(--gold-light);
    padding: 12px 24px; border-radius: 100px;
    font-size: 13px; letter-spacing: 1.5px;
    box-shadow: 0 4px 30px rgba(0,0,0,0.4);
    transition: transform .4s cubic-bezier(.22,1,.36,1), opacity .4s;
    opacity: 0; pointer-events:none; z-index:100;
    white-space: nowrap;
  }
  .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

  /* ── FOOTER TAG ── */
  .footer-tag {
    font-size: 11px; letter-spacing: 3px; color: rgba(212,164,55,0.25);
    text-transform: uppercase; text-align:center;
    animation: fadeDown 1s .6s ease both;
  }

  /* ── MOBILE TOUCH HINT ── */
  .touch-hint {
    font-size:11px; color:rgba(245,213,128,0.3); letter-spacing:1px;
    text-align:center; margin-top:-8px;
  }


  /* ── TEMPLATE SELECTOR ── */
  .template-section { width:100%; }
  .template-section-label {
    font-size:11px; letter-spacing:2.5px; text-transform:uppercase;
    color:rgba(245,213,128,0.55); margin-bottom:10px; display:block;
  }
  .template-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .tpl-card {
    position: relative; aspect-ratio: 1;
    border-radius: 12px; border: 1.5px solid rgba(212,164,55,0.2);
    background: rgba(0,0,0,0.3); cursor: pointer; overflow: hidden;
    transition: all .25s cubic-bezier(.22,1,.36,1);
    display: flex; align-items: center; justify-content: center;
  }
  .tpl-card:hover { border-color: var(--gold); transform: translateY(-3px); box-shadow: 0 6px 20px rgba(212,164,55,0.25); }
  .tpl-card.active {
    border-color: var(--gold-light);
    box-shadow: 0 0 0 2px rgba(245,213,128,0.4), 0 6px 24px rgba(212,164,55,0.3);
    background: rgba(212,164,55,0.08);
  }
  .tpl-card img { width:100%; height:100%; object-fit:cover; border-radius:10px; opacity:.85; transition:opacity .2s; }
  .tpl-card:hover img, .tpl-card.active img { opacity:1; }
  .tpl-card.locked { cursor:not-allowed; opacity:0.4; }
  .tpl-card.locked:hover { transform:none; box-shadow:none; border-color:rgba(212,164,55,0.2); }
  .tpl-lock {
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:4px;
    background:rgba(0,0,0,0.55); border-radius:10px;
  }
  .tpl-lock-icon { font-size:20px; }
  .tpl-lock-text { font-size:9px; letter-spacing:1.5px; color:rgba(245,213,128,0.5); text-transform:uppercase; }
  .tpl-card.active::after {
    content:'✦'; position:absolute; top:4px; right:6px;
    font-size:10px; color:var(--gold-light); text-shadow:0 0 8px var(--gold);
  }
</style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>
<div class="dust"></div>

<div class="page">

  <header>
    <div class="logo-tag">✦ PFP Generator ✦</div>
    <img src="assets/logo.png" alt="Prisma" class="brand-logo">
    <p class="subtitle">Made by ayush (__x.fomo)</p>
  </header>

  <div class="card">

    <!-- Canvas -->
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="canvas"></canvas>
      <div class="canvas-placeholder" id="placeholder">
        <span class="placeholder-icon">🖼️</span>
        <span class="placeholder-text">Upload your photo</span>
      </div>
    </div>

    <p class="touch-hint" id="touchHint" style="display:none">👆 Drag to reposition your photo</p>

    <!-- Upload -->
    <!-- Hidden file input, triggered by JS click -->
    <input type="file" id="upload" accept="image/*" style="display:none">
    <div class="upload-zone" id="uploadZone">
      <span class="upload-icon">📁</span>
      <div class="upload-label">Choose Photo</div>
      <div class="upload-sub">or drag & drop here</div>
    </div>


    <!-- Template Selector -->
    <div class="template-section">
      <span class="template-section-label">Choose Template</span>
      <div class="template-grid" id="templateGrid">

        <!-- Template 1 — active/available -->
        <div class="tpl-card active" data-src="assets/robocat.png">
          <img src="assets/robocat.png" alt="Template 1" onerror="this.style.display='none'">
        </div>

        <!-- Templates 2-4 — coming soon (remove 'locked' class + add data-src when ready) -->
        <div class="tpl-card" data-src="assets/franklin.png">
          <img src="assets/franklin.png" alt="Template 2">
        </div>
        <div class="tpl-card locked">
          <div class="tpl-lock"><span class="tpl-lock-icon">🔒</span><span class="tpl-lock-text">Soon</span></div>
        </div>
        <div class="tpl-card locked">
          <div class="tpl-lock"><span class="tpl-lock-icon">🔒</span><span class="tpl-lock-text">Soon</span></div>
        </div>

      </div>
    </div>

    <div class="divider"></div>

    <!-- Controls -->
    <div class="controls">

      <div class="ctrl-row">
        <div class="ctrl-label">Zoom <span id="zoomVal">1.00×</span></div>
        <input type="range" id="zoom" min="0.1" max="10" step="0.005" value="1">
      </div>

      <div class="ctrl-row">
        <div class="ctrl-label">Rotate <span id="rotateVal">0°</span></div>
        <input type="range" id="rotate" min="-180" max="180" step="1" value="0">
      </div>

    </div>

    <div class="divider"></div>

    <!-- Flip Buttons -->
    <div class="btn-row">
      <button class="btn btn-secondary" id="flipH">⇄ Flip Horizontal</button>
      <button class="btn btn-secondary" id="flipV">⇅ Flip Vertical</button>
    </div>

    <!-- Buttons -->
    <div class="btn-row">
      <button class="btn btn-secondary" id="resetBtn">↺ Reset</button>
      <button class="btn btn-primary" id="download">⬇ Download</button>
    </div>

  </div>

  <p class="footer-tag">✦ Share fun and Enjoy Robotics ✦</p>

</div>

<div class="toast" id="toast"></div>

<script>
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  const wrap = document.getElementById("canvasWrap");
  const placeholder = document.getElementById("placeholder");
  const touchHint = document.getElementById("touchHint");

  canvas.width = 3464;
  canvas.height = 3464;

  let userImg = null;
  let template = null;

  let posX = canvas.width / 2;
  let posY = canvas.height / 2;
  let zoom = 1;
  let rotation = 0;
  let flipH = false;
  let flipV = false;

  // ── DRAW ──
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (userImg) {
      ctx.save();
      ctx.translate(posX, posY);
      ctx.rotate(rotation);
      ctx.scale(zoom * (flipH ? -1 : 1), zoom * (flipV ? -1 : 1));
      ctx.drawImage(userImg, -userImg.width / 2, -userImg.height / 2);
      ctx.restore();
    }
    if (template) {
      ctx.drawImage(template, 0, 0, canvas.width, canvas.height);
    }
  }

  // ── TEMPLATE LOADER (works with local files via img element) ──
  // To add a new template:
  // 1. Remove 'locked' class from a tpl-card
  // 2. Add data-src="assets/your-file.png" to the card
  // 3. Add <img src="assets/your-file.png"> inside the card
  function loadTemplate(src) {
    const img = new Image();
    img.onload = () => { template = img; draw(); };
    img.onerror = () => { console.warn("Template not found:", src); template = null; draw(); };
    img.src = src;
  }

  // Load default on start
  loadTemplate("assets/robocat.png");

  // Template grid click
  document.getElementById("templateGrid").addEventListener("click", e => {
    const card = e.target.closest(".tpl-card");
    if (!card || card.classList.contains("locked")) return;
    document.querySelectorAll(".tpl-card").forEach(c => c.classList.remove("active"));
    card.classList.add("active");
    loadTemplate(card.dataset.src);
    showToast("✦ Template changed!");
  });

  // ── UPLOAD — use hidden input triggered by clicking the zone ──
  const uploadZone = document.getElementById("uploadZone");
  const uploadInput = document.getElementById("upload");

  // Clicking the zone triggers the file picker
  uploadZone.addEventListener("click", () => uploadInput.click());

  uploadInput.addEventListener("change", e => {
    const file = e.target.files[0];
    if (!file) return;
    loadUserImage(file);
    // reset so same file can be re-selected
    uploadInput.value = "";
  });

  function loadUserImage(file) {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        userImg = img;
        const scale = Math.max(canvas.width / img.width, canvas.height / img.height);
        posX = canvas.width / 2;
        posY = canvas.height / 2;
        zoom = scale;
        rotation = 0;
        flipH = false;
        flipV = false;
        document.getElementById("zoom").value = Math.min(scale, 10);
        document.getElementById("rotate").value = 0;
        updateLabels();
        placeholder.classList.add("hidden");
        touchHint.style.display = "block";
        draw();
        showToast("✦ Photo loaded!");
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  // ── DRAG & DROP ──
  uploadZone.addEventListener("dragover", e => { e.preventDefault(); e.stopPropagation(); uploadZone.classList.add("drag-over"); });
  uploadZone.addEventListener("dragleave", e => { e.stopPropagation(); uploadZone.classList.remove("drag-over"); });
  uploadZone.addEventListener("drop", e => {
    e.preventDefault(); e.stopPropagation();
    uploadZone.classList.remove("drag-over");
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith("image/")) loadUserImage(file);
  });

  // ── MOUSE DRAG on canvas ──
  let dragging = false, startX = 0, startY = 0;
  function getScale() { return canvas.width / wrap.offsetWidth; }

  canvas.addEventListener("mousedown", e => {
    if (!userImg) return;
    dragging = true;
    startX = e.offsetX; startY = e.offsetY;
  });
  window.addEventListener("mousemove", e => {
    if (!dragging || !userImg) return;
    const rect = wrap.getBoundingClientRect();
    const s = getScale();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    posX += (cx - startX) * s;
    posY += (cy - startY) * s;
    startX = cx; startY = cy;
    draw();
  });
  window.addEventListener("mouseup", () => dragging = false);

  // ── TOUCH DRAG & PINCH ──
  let lastTouchX = 0, lastTouchY = 0, lastDist = 0;

  canvas.addEventListener("touchstart", e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    if (e.touches.length === 1) {
      lastTouchX = e.touches[0].clientX - rect.left;
      lastTouchY = e.touches[0].clientY - rect.top;
    } else if (e.touches.length === 2) {
      lastDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
    }
  }, { passive: false });

  canvas.addEventListener("touchmove", e => {
    e.preventDefault();
    if (!userImg) return;
    const rect = canvas.getBoundingClientRect();
    const s = getScale();
    if (e.touches.length === 1) {
      const cx = e.touches[0].clientX - rect.left;
      const cy = e.touches[0].clientY - rect.top;
      posX += (cx - lastTouchX) * s;
      posY += (cy - lastTouchY) * s;
      lastTouchX = cx; lastTouchY = cy;
      draw();
    } else if (e.touches.length === 2) {
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      zoom = Math.min(Math.max(zoom * (dist / lastDist), 0.1), 10);
      document.getElementById("zoom").value = zoom;
      updateLabels();
      lastDist = dist;
      draw();
    }
  }, { passive: false });

  // ── ZOOM & ROTATE SLIDERS ──
  document.getElementById("zoom").addEventListener("input", e => {
    zoom = parseFloat(e.target.value);
    updateLabels(); draw();
  });
  document.getElementById("rotate").addEventListener("input", e => {
    rotation = parseFloat(e.target.value) * Math.PI / 180;
    updateLabels(); draw();
  });

  function updateLabels() {
    document.getElementById("zoomVal").textContent = zoom.toFixed(2) + "×";
    document.getElementById("rotateVal").textContent = Math.round(rotation * 180 / Math.PI) + "°";
  }

  // ── FLIP ──
  document.getElementById("flipH").addEventListener("click", () => {
    if (!userImg) { showToast("Upload a photo first!"); return; }
    flipH = !flipH; draw();
    showToast(flipH ? "⇄ Flipped Horizontal" : "⇄ Restored");
  });
  document.getElementById("flipV").addEventListener("click", () => {
    if (!userImg) { showToast("Upload a photo first!"); return; }
    flipV = !flipV; draw();
    showToast(flipV ? "⇅ Flipped Vertical" : "⇅ Restored");
  });

  // ── RESET ──
  document.getElementById("resetBtn").addEventListener("click", () => {
    if (!userImg) return;
    const scale = Math.max(canvas.width / userImg.width, canvas.height / userImg.height);
    posX = canvas.width / 2; posY = canvas.height / 2;
    zoom = scale; rotation = 0; flipH = false; flipV = false;
    document.getElementById("zoom").value = Math.min(scale, 10);
    document.getElementById("rotate").value = 0;
    updateLabels(); draw();
    showToast("✦ Reset!");
  });

  // ── DOWNLOAD ──
  document.getElementById("download").addEventListener("click", () => {
    if (!userImg) { showToast("Upload a photo first!"); return; }
    const link = document.createElement("a");
    link.href = canvas.toDataURL("image/png");
    link.download = "prisma-pfp.png";
    link.click();
    showToast("✦ PFP Downloaded!");
  });

  // ── TOAST ──
  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove("show"), 2500);
  }

  draw();
</script>
</body>
</html>
